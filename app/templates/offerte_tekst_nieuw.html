{% extends "base.html" %}

{% block title %}Tekstregel toevoegen{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2 class="mb-1">

            <i class="bi bi-fonts"></i>

            Tekstregel toevoegen

        </h2>

        <p class="text-muted mb-0">

            Voeg een vrije tekst toe aan de offerte.

        </p>

    </div>

    <a
        href="/offerte/{{ offerte_id }}"
        class="btn btn-outline-secondary">

        <i class="bi bi-arrow-left"></i>

        Terug

    </a>

</div>

<div class="card shadow">

    <div class="card-body">

        <form method="post">

            <div class="mb-4">

                <label class="form-label">

                    Tekst

                </label>

                <textarea
                    name="omschrijving"
                    rows="8"
                    class="form-control"
                    placeholder="Bijvoorbeeld:

• Inclusief montage
• Exclusief graafwerk
• Levertijd circa 3 weken
• Garantie volgens fabrieksvoorwaarden"
                    required></textarea>

            </div>

            <button
                type="submit"
                class="btn btn-success">

                <i class="bi bi-check-circle"></i>

                Tekst toevoegen

            </button>

            <a
                href="/offerte/{{ offerte_id }}"
                class="btn btn-secondary">

                Annuleren

            </a>

        </form>

    </div>

</div>

{% endblock %}
