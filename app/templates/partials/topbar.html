<div class="topbar">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

        <!-- Linkerkant -->
        <div class="d-flex align-items-center gap-3 flex-grow-1">

            <div>
                <h4 class="mb-0 fw-bold">
                    {% block page_title %}
                    Dashboard
                    {% endblock %}
                </h4>

                <small class="text-muted">
                    Welkom in Feron Suite
                </small>
            </div>

            <!-- Zoekbalk -->
            <div class="position-relative flex-grow-1">

                <input
                    id="globalSearch"
                    type="text"
                    class="form-control"
                    placeholder="Zoek klant, project, offerte of materiaal... (Ctrl + F)"
                    autocomplete="off">

                <!-- Zoekresultaten -->
                <div
                    id="searchResults"
                    class="card shadow position-absolute w-100 mt-1"
                    style="
                        display:none;
                        z-index:1050;
                        max-height:500px;
                        overflow-y:auto;
                    ">

                    <div class="list-group list-group-flush">
                        <!-- JavaScript vult hier de resultaten -->
                    </div>

                </div>

            </div>

        </div>

        <!-- Rechterkant -->
        <div class="d-flex align-items-center gap-2">

            <!-- Nieuw -->
            <div class="dropdown">

                <button
                    class="btn btn-primary dropdown-toggle"
                    type="button"
                    data-bs-toggle="dropdown">

                    <i class="bi bi-plus-circle"></i>
                    Nieuw

                </button>

                <ul class="dropdown-menu dropdown-menu-end">

                    <li>
                        <a class="dropdown-item" href="/klanten">
                            <i class="bi bi-person-plus"></i>
                            Nieuwe klant
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="/project/nieuw">
                            <i class="bi bi-folder-plus"></i>
                            Nieuw project
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="/offertes">
                            <i class="bi bi-file-earmark-text"></i>
                            Nieuwe offerte
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="/materialen">
                            <i class="bi bi-box-seam"></i>
                            Nieuw materiaal
                        </a>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <li>
                        <a class="dropdown-item" href="/ess">
                            <i class="bi bi-battery-charging"></i>
                            ESS Berekening
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="/ai">
                            <i class="bi bi-robot"></i>
                            AI Calculator
                        </a>
                    </li>

                </ul>

            </div>

            <!-- Notificaties -->
            <button class="btn btn-light position-relative">

                <i class="bi bi-bell"></i>

                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    3
                </span>

            </button>

            <!-- Donkere modus (later) -->
            <button
                class="btn btn-light"
                id="themeToggle"
                title="Donkere modus">

                <i class="bi bi-moon"></i>

            </button>

            <!-- Gebruiker -->
            <div class="dropdown">

                <button
                    class="btn btn-outline-secondary dropdown-toggle"
                    data-bs-toggle="dropdown">

                    <i class="bi bi-person-circle"></i>
                    Bryan

                </button>

                <ul class="dropdown-menu dropdown-menu-end">

                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="bi bi-person"></i>
                            Mijn profiel
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="/instellingen">
                            <i class="bi bi-gear"></i>
                            Instellingen
                        </a>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <li>
                        <a class="dropdown-item text-danger" href="/logout">
                            <i class="bi bi-box-arrow-right"></i>
                            Uitloggen
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </div>

</div>
