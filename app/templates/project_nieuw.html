{% extends "base.html" %}

{% block title %}Nieuw Project{% endblock %}

{% block content %}

<h1 class="mb-4">Nieuw project</h1>

<div class="card shadow">

    <div class="card-body">

        <form method="post">

            <input type="hidden" name="klant_id" value="{{ klant_id }}">

            <div class="mb-3">
                <label class="form-label">Projectnaam</label>
                <input
                    type="text"
                    class="form-control"
                    name="naam"
                    placeholder="Bijvoorbeeld: ESS Installatie"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Projecttype</label>

                <select class="form-select" name="type">
                    <option value="ESS">🔋 ESS Installatie</option>
                    <option value="Meterkast">⚡ Meterkast</option>
                    <option value="Laadpaal">🚗 Laadpaal</option>
                    <option value="Service">🔧 Service</option>
                    <option value="Verlichting">💡 Verlichting</option>
                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">Status</label>

                <select class="form-select" name="status">
                    <option value="Nieuw">Nieuw</option>
                    <option value="Offerte">Offerte</option>
                    <option value="Gepland">Gepland</option>
                    <option value="In uitvoering">In uitvoering</option>
                    <option value="Gereed">Gereed</option>
                </select>

            </div>

            <button class="btn btn-success">
                Project opslaan
            </button>

        </form>

    </div>

</div>

{% endblock %}
