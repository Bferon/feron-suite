{% extends "base.html" %}

{% block title %}Nieuw Project{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow">

            <div class="card-header">

                <h4 class="mb-0">

                    <i class="bi bi-folder-plus"></i>

                    Nieuw project

                </h4>

            </div>

            <div class="card-body">

                <form method="post">

                    <div class="mb-3">

                        <label class="form-label">

                            Klant

                        </label>

                        <select
                            class="form-select"
                            name="klant_id"
                            required>

                            <option value="">
                                -- Kies een klant --
                            </option>

                            {% for klant in klanten %}

                                <option
                                    value="{{ klant.id }}"
                                    {% if klant.id == klant_id %}selected{% endif %}>

                                    {{ klant.naam }}

                                </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Projectnaam

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="naam"
                            placeholder="Bijvoorbeeld: ESS Installatie"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Projecttype

                        </label>

                        <select
                            class="form-select"
                            name="type">

                            <option value="ESS">🔋 ESS Installatie</option>
                            <option value="Meterkast">⚡ Meterkast</option>
                            <option value="Laadpaal">🚗 Laadpaal</option>
                            <option value="Service">🔧 Service</option>
                            <option value="Verlichting">💡 Verlichting</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Status

                        </label>

                        <select
                            class="form-select"
                            name="status">

                            <option value="Nieuw">Nieuw</option>
                            <option value="Offerte">Offerte</option>
                            <option value="Gepland">Gepland</option>
                            <option value="In uitvoering">In uitvoering</option>
                            <option value="Gereed">Gereed</option>

                        </select>

                    </div>

                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-success">

                            <i class="bi bi-check-circle"></i>

                            Project opslaan

                        </button>

                        <a
                            href="/projecten"
                            class="btn btn-secondary">

                            Annuleren

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
