{% extends "base.html" %}

{% block title %}Instellingen{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2>
            <i class="bi bi-gear"></i>
            Instellingen
        </h2>

        <p class="text-muted mb-0">
            Beheer de bedrijfsgegevens en standaardinstellingen van Feron Suite.
        </p>

    </div>

</div>

<form method="post">

    <div class="row">

        <!-- Bedrijfsgegevens -->

        <div class="col-lg-6">

            <div class="card mb-4">

                <div class="card-header">

                    <strong>🏢 Bedrijfsgegevens</strong>

                </div>

                <div class="card-body">

                    <div class="mb-3">

                        <label class="form-label">Bedrijfsnaam</label>

                        <input
                            class="form-control"
                            name="bedrijfsnaam"
                            value="{{ instellingen.bedrijfsnaam }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Adres</label>

                        <input
                            class="form-control"
                            name="adres"
                            value="{{ instellingen.adres }}">

                    </div>

                    <div class="row">

                        <div class="col-md-4">

                            <label class="form-label">Postcode</label>

                            <input
                                class="form-control"
                                name="postcode"
                                value="{{ instellingen.postcode }}">

                        </div>

                        <div class="col-md-8">

                            <label class="form-label">Plaats</label>

                            <input
                                class="form-control"
                                name="plaats"
                                value="{{ instellingen.plaats }}">

                        </div>

                    </div>

                    <div class="mt-3">

                        <label class="form-label">Telefoon</label>

                        <input
                            class="form-control"
                            name="telefoon"
                            value="{{ instellingen.telefoon }}">

                    </div>

                    <div class="mt-3">

                        <label class="form-label">E-mail</label>

                        <input
                            class="form-control"
                            name="email"
                            value="{{ instellingen.email }}">

                    </div>

                    <div class="row mt-3">

                        <div class="col">

                            <label class="form-label">KvK</label>

                            <input
                                class="form-control"
                                name="kvk"
                                value="{{ instellingen.kvk }}">

                        </div>

                        <div class="col">

                            <label class="form-label">BTW-nummer</label>

                            <input
                                class="form-control"
                                name="btw_nummer"
                                value="{{ instellingen.btw_nummer }}">

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- Financieel -->

        <div class="col-lg-6">

            <div class="card mb-4">

                <div class="card-header">

                    <strong>💰 Financiële instellingen</strong>

                </div>

                <div class="card-body">

                    <div class="mb-3">

                        <label class="form-label">Uurtarief (€)</label>

                        <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            name="uurtarief"
                            value="{{ instellingen.uurtarief }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Voorrijkosten (€)</label>

                        <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            name="voorrijkosten"
                            value="{{ instellingen.voorrijkosten }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">BTW (%)</label>

                        <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            name="btw_percentage"
                            value="{{ instellingen.btw_percentage }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Gewenste winstmarge (%)</label>

                        <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            name="winstmarge"
                            value="{{ instellingen.winstmarge }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Standaard leverancier</label>

                        <input
                            class="form-control"
                            name="standaard_leverancier"
                            value="{{ instellingen.standaard_leverancier }}">

                    </div>

                </div>

            </div>

        </div>

    </div>

    <button class="btn btn-primary btn-lg">

        <i class="bi bi-floppy"></i>

        Instellingen opslaan

    </button>

</form>

{% endblock %}
