{% extends "base.html" %}

{% block title %}Nieuw materiaal{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card">

            <div class="card-header">

                <h4 class="mb-0">
                    Nieuw materiaal
                </h4>

            </div>

            <div class="card-body">

                <form method="post">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">Categorie</label>

                            <select class="form-select" name="categorie">

                                {% for categorie in categorieen %}

                                    <option>{{ categorie }}</option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">Merk</label>

                            <input
                                class="form-control"
                                name="merk">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Artikelnummer
                            </label>

                            <input
                                class="form-control"
                                name="artikelnummer">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Leverancier
                            </label>

                            <input
                                class="form-control"
                                name="leverancier">

                        </div>

                        <div class="col-12 mb-3">

                            <label class="form-label">
                                Omschrijving
                            </label>

                            <input
                                class="form-control"
                                name="omschrijving"
                                required>

                        </div>

                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Inkoopprijs
                            </label>

                            <input
                                class="form-control"
                                type="number"
                                step="0.01"
                                name="inkoopprijs">

                        </div>

                        <div class="col-md-4 mb-3">

                            <label class="form-label">
                                Verkoopprijs
                            </label>

                            <input
                                class="form-control"
                                type="number"
                                step="0.01"
                                name="verkoopprijs">

                        </div>

                        <div class="col-md-2 mb-3">

                            <label class="form-label">
                                Eenheid
                            </label>

                            <input
                                class="form-control"
                                value="st"
                                name="eenheid">

                        </div>

                        <div class="col-md-2 mb-3">

                            <label class="form-label">
                                Voorraad
                            </label>

                            <input
                                class="form-control"
                                type="number"
                                value="0"
                                name="voorraad">

                        </div>

                    </div>

                    <div class="mt-3">

                        <button class="btn btn-primary">

                            Opslaan

                        </button>

                        <a
                            href="/materialen"
                            class="btn btn-secondary">

                            Annuleren

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
